<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - RailMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/pages/events.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>Impact Events</h1>
                <div class="live-row">
                    <span id="liveDot" class="live-dot"></span>
                    <span id="connStatus" class="conn-status conn-off">Connecting…</span>
                </div>
            </div>
            <div class="filters">
                <select id="severityFilter">
                    <option value="all">All Severities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <input type="date" id="filterFrom" title="From date" style="padding:0.4rem 0.6rem;border:1px solid #e2e8f0;border-radius:0.375rem;font-size:0.8rem;color:#0f172a;background:#fff;">
                <input type="date" id="filterTo"   title="To date"   style="padding:0.4rem 0.6rem;border:1px solid #e2e8f0;border-radius:0.375rem;font-size:0.8rem;color:#0f172a;background:#fff;">
                <button onclick="exportEvents()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Events</div>
                <div class="value" id="totalEvents">—</div>
            </div>
            <div class="stat-card stat-high">
                <div class="label">High Severity</div>
                <div class="value" id="highEvents">—</div>
            </div>
            <div class="stat-card stat-medium">
                <div class="label">Medium Severity</div>
                <div class="value" id="mediumEvents">—</div>
            </div>
            <div class="stat-card stat-low">
                <div class="label">Low Severity</div>
                <div class="value" id="lowEvents">—</div>
            </div>
        </div>

        <div id="eventsList"><p class="empty">Loading events…</p></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/pages/events.js"></script>
</body>
</html>
